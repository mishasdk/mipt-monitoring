services:
  ml-service:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./metrics.json:/metrics.json

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: dqops
      POSTGRES_PASSWORD: dqops
      POSTGRES_DB: dqops_db
    ports:
      - "5432:5432"

  dqops:
    image: dqops/dqo:latest
    ports:
      - "8080:8080"
    volumes:
      - ./dqops_workspace:/dqo/userhome
    depends_on:
      - postgres
